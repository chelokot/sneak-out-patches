[general]
## Settings file was created by version 0.1.0 of Runtime Profiler
## Plugin GUID: chelokot.sneakout.runtime-profiler
## Plugin Name: Runtime Profiler
## Plugin Version: 0.1.0

## Enable the runtime method profiler.
# Setting type: Boolean
# Default value: true
EnableMod = false

## Write profiler setup details to the BepInEx log.
# Setting type: Boolean
# Default value: false
EnableLogging = false

[targeting]
## Semicolon-separated assembly names to scan for methods.
# Setting type: String
# Default value: Assembly-CSharp;Kinguinverse
TargetAssemblies = Assembly-CSharp;Kinguinverse

## Semicolon-separated full type-name prefixes to include.
# Setting type: String
# Default value: Gameplay.Match.;Networking.PGOS.;UI.Views.
IncludeNamespacePrefixes = UI.Views.AvatarAndFrameView;UI.Views.MainBoostersView

## Semicolon-separated method signature substrings to include after namespace filtering.
# Setting type: String
# Default value:
TargetMethodPatterns =

## Semicolon-separated full type-name prefixes to exclude.
# Setting type: String
# Default value: Gameplay.Match.MatchState.;UI.Views.BattlepassView;UI.Views.DailyQuestsView
ExcludeNamespacePrefixes =

## Patch property/event accessor methods.
# Setting type: Boolean
# Default value: false
IncludePropertyAccessors = false

## Patch constructors.
# Setting type: Boolean
# Default value: false
IncludeConstructors = false

## Patch compiler-generated methods and closure/state-machine types.
# Setting type: Boolean
# Default value: false
IncludeCompilerGenerated = false

## Maximum number of methods to patch after filtering.
# Setting type: Int32
# Default value: 300
MaxPatchedMethods = 40

[report]
## Maximum number of methods to write into the report.
# Setting type: Int32
# Default value: 200
TopMethodCount = 200

## Maximum number of caller->callee edges to write into the report.
# Setting type: Int32
# Default value: 100
TopEdgeCount = 100
